version: 2

models:
  - name: int_poverty_by_region
    description: >
      Unpivoted poverty data in long format for national and regional entries.
      One row per geo_name per year (2018, 2021, 2023).
    columns:
      - name: geo_name
        description: Geographic area name.
        tests:
          - not_null
      - name: geo_level
        description: "Hierarchy level: national or region."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['national', 'region']
      - name: year
        description: Survey year.
        tests:
          - not_null
      - name: poverty_incidence_pct
        description: Poverty incidence among families (%).
  - name: int_poverty_families_5yr_by_region
    description: >
      Unpivoted 5-year historical poverty data in long format for national
      and regional entries. One row per geo_name per year (1991, 2006, 2009, 2012, 2015).
      Includes magnitude of poor families.
    columns:
      - name: geo_name
        description: Geographic area name.
        tests:
          - not_null
      - name: geo_level
        description: "Hierarchy level: national or region."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['national', 'region']
      - name: year
        description: Survey year.
        tests:
          - not_null
      - name: poverty_incidence_pct
        description: Poverty incidence among families (%).
      - name: magnitude_poor_families
        description: Number of poor families.
  - name: int_municipal_poverty_by_year
    description: >
      Unpivoted municipal poverty data in long format.
      One row per municipality per year (2006, 2009, 2012).
      CI columns are NULL for 2006 and 2009 (only available for 2012).
    columns:
      - name: pcode
        description: Philippine Standard Geographic Code.
        tests:
          - not_null
      - name: region
        description: Region name.
        tests:
          - not_null
      - name: province
        description: Province name.
        tests:
          - not_null
      - name: municipality_city
        description: Municipality or city name.
        tests:
          - not_null
      - name: year
        description: Survey year.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2006, 2009, 2012]
      - name: poverty_incidence_pct
        description: Poverty incidence estimate (%).
