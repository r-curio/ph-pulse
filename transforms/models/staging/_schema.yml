version: 2

models:
  - name: stg_poverty_incidence_families
    description: >
      Cleaned and typed PSA poverty incidence data.
      Parses geolocation hierarchy (national/region/province) from leading dots.
      Replaces ".." missing values with NULL and casts metrics to FLOAT64.
    columns:
      - name: geo_name
        description: Geographic area name with leading dots stripped.
        tests:
          - not_null
      - name: geo_level
        description: "Hierarchy level: national, region, or province."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['national', 'region', 'province']
  - name: stg_poverty_families_5yr
    description: >
      Cleaned and typed PSA poverty families 5-year historical data.
      Parses geolocation hierarchy (national/region/province) using
      dot count + name check (both national and regions have 0 dots).
      Replaces ".." missing values with NULL and casts metrics to FLOAT64.
    columns:
      - name: geo_name
        description: Geographic area name with leading dots stripped.
        tests:
          - not_null
      - name: geo_level
        description: "Hierarchy level: national, region, or province."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['national', 'region', 'province']
  - name: stg_municipal_poverty_estimates
    description: >
      Cleaned and typed HDX municipal poverty estimates.
      Handles "-" and empty missing values with nullif, casts metrics to FLOAT64.
      Normalizes double-space municipality names with regexp_replace.
      Casts prelim_2012 to BOOLEAN.
    columns:
      - name: pcode
        description: Philippine Standard Geographic Code.
        tests:
          - not_null
      - name: region
        description: Region name.
        tests:
          - not_null
      - name: province
        description: Province name.
        tests:
          - not_null
      - name: municipality_city
        description: Municipality or city name (whitespace-normalized).
        tests:
          - not_null
