version: 2

sources:
  - name: ph_pulse
    database: ph-pulse
    schema: ph_pulse
    tables:
      - name: raw_poverty_incidence_families
        description: >
          PSA poverty incidence among families by region/province.
          Wide format with metrics for 2018, 2021, 2023.
          All columns stored as STRING in raw layer.
      - name: raw_poverty_families_5yr
        description: >
          PSA poverty among families 5-year historical data by region/province.
          Wide format with metrics for 1991, 2006, 2009, 2012, 2015.
          Includes magnitude of poor families. All columns STRING in raw layer.
      - name: raw_municipal_poverty_estimates
        description: >
          HDX municipal poverty estimates for 1,646 municipalities/cities
          across 17 regions and 85 provinces. Wide format with poverty
          incidence, standard error, and CoV for 2006, 2009, 2012.
          Includes 90% confidence intervals for 2012 only.
          All columns STRING in raw layer.
