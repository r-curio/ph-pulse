version: 2

models:
  - name: mart_regional_poverty_summary
    description: >
      Final mart with regional and national poverty data in long format.
      Includes year-over-year change and poverty tier classification.
      Materialized as a TABLE for dashboard consumption.
    columns:
      - name: geo_name
        description: Geographic area name.
        tests:
          - not_null
      - name: geo_level
        description: "Hierarchy level: national or region."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['national', 'region']
      - name: year
        description: Survey year.
        tests:
          - not_null
      - name: poverty_tier
        description: "Classification: High (>=20%), Medium (>=10%), Low (<10%)."
        tests:
          - accepted_values:
              arguments:
                values: ['High', 'Medium', 'Low']
  - name: mart_poverty_families_5yr_summary
    description: >
      Final mart with 5-year historical regional and national poverty data
      in long format. Includes year-over-year changes for poverty incidence
      and magnitude of poor families, plus poverty tier classification.
      Materialized as a TABLE for dashboard consumption.
    columns:
      - name: geo_name
        description: Geographic area name.
        tests:
          - not_null
      - name: geo_level
        description: "Hierarchy level: national or region."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['national', 'region']
      - name: year
        description: Survey year.
        tests:
          - not_null
      - name: poverty_tier
        description: "Classification: High (>=20%), Medium (>=10%), Low (<10%)."
        tests:
          - accepted_values:
              arguments:
                values: ['High', 'Medium', 'Low']
  - name: mart_municipal_poverty_summary
    description: >
      Final mart with municipal poverty data in long format.
      Includes year-over-year change in poverty incidence and poverty tier
      classification. Materialized as a TABLE for dashboard consumption.
    columns:
      - name: pcode
        description: Philippine Standard Geographic Code.
        tests:
          - not_null
      - name: region
        description: Region name.
        tests:
          - not_null
      - name: province
        description: Province name.
        tests:
          - not_null
      - name: municipality_city
        description: Municipality or city name.
        tests:
          - not_null
      - name: year
        description: Survey year.
        tests:
          - not_null
      - name: poverty_tier
        description: "Classification: High (>=20%), Medium (>=10%), Low (<10%)."
        tests:
          - accepted_values:
              arguments:
                values: ['High', 'Medium', 'Low']
